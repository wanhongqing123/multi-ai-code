<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="8%" y1="6%" x2="94%" y2="94%">
      <stop offset="0%" stop-color="#0f2233"/>
      <stop offset="100%" stop-color="#07131f"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ed6b5"/>
      <stop offset="100%" stop-color="#2ea8ff"/>
    </linearGradient>
    <linearGradient id="surface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef7ff"/>
      <stop offset="100%" stop-color="#d8ebfa"/>
    </linearGradient>
    <linearGradient id="symbol" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b89f"/>
      <stop offset="100%" stop-color="#0078d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feOffset in="blur" dy="10" result="offset"/>
      <feColorMatrix
        in="offset"
        type="matrix"
        values="0 0 0 0 0.02 0 0 0 0 0.07 0 0 0 0 0.12 0 0 0 0.5 0"
      />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)" />
  <rect x="6" y="6" width="1012" height="1012" rx="218" ry="218" fill="none" stroke="url(#frame)" stroke-width="3" opacity="0.3" />

  <g filter="url(#shadow)">
    <rect x="186" y="210" width="652" height="604" rx="74" ry="74" fill="url(#surface)" />
    <rect x="186" y="210" width="652" height="118" rx="74" ry="74" fill="#c7e1f7" />
    <circle cx="256" cy="270" r="14" fill="#ff7b7b" />
    <circle cx="304" cy="270" r="14" fill="#ffca63" />
    <circle cx="352" cy="270" r="14" fill="#34d399" />
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="52">
    <polyline points="360,474 282,552 360,630" stroke="url(#symbol)" />
    <line x1="432" y1="640" x2="552" y2="640" stroke="#0f2233" />
  </g>

  <g fill="none" stroke="#1d5b88" stroke-linecap="round" stroke-linejoin="round" stroke-width="18" opacity="0.55">
    <polyline points="596,448 552,512 596,576" />
    <line x1="648" y1="444" x2="620" y2="580" />
    <polyline points="672,448 716,512 672,576" />
  </g>
</svg>
