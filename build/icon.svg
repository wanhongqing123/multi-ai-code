<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2d3a"/>
      <stop offset="100%" stop-color="#14151f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ab4f8"/>
      <stop offset="100%" stop-color="#c7a0ff"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f7ff"/>
      <stop offset="100%" stop-color="#d8dcf0"/>
    </linearGradient>
    <linearGradient id="fold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bcc2de"/>
      <stop offset="100%" stop-color="#8a91b5"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7a0ff"/>
      <stop offset="100%" stop-color="#7aa6ff"/>
    </linearGradient>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feOffset in="b" dx="0" dy="10" result="s"/>
      <feColorMatrix in="s" type="matrix"
        values="0 0 0 0 0.05  0 0 0 0 0.07  0 0 0 0 0.12  0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="4" y="4" width="1016" height="1016" rx="220" ry="220"
        fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.22"/>

  <g filter="url(#softshadow)">
    <path d="
      M 264 232
      L 692 232
      L 792 332
      L 792 808
      Q 792 840 760 840
      L 264 840
      Q 232 840 232 808
      L 232 264
      Q 232 232 264 232 Z"
      fill="url(#paper)"/>
    <path d="M 692 232 L 792 332 L 692 332 Z" fill="url(#fold)"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="42">
    <polyline points="430,486 348,568 430,650" stroke="#5c7cf0"/>
    <line x1="560" y1="448" x2="464" y2="688" stroke="#9871d6"/>
    <polyline points="594,486 676,568 594,650" stroke="#5c7cf0"/>
  </g>

  <g transform="translate(210 206)" filter="url(#glow)">
    <path d="
      M 0 -96
      C 14 -30 30 -14 96 0
      C 30 14 14 30 0 96
      C -14 30 -30 14 -96 0
      C -30 -14 -14 -30 0 -96 Z"
      fill="url(#spark)"/>
  </g>
  <g transform="translate(126 312)" opacity="0.85">
    <path d="
      M 0 -36
      C 6 -12 12 -6 36 0
      C 12 6 6 12 0 36
      C -6 12 -12 6 -36 0
      C -12 -6 -6 -12 0 -36 Z"
      fill="url(#spark)"/>
  </g>
</svg>
