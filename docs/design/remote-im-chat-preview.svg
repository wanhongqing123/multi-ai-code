  <path d="M18 64H1422" stroke="#e2e8f0"/>
  <rect x="42" y="36" width="28" height="28" rx="8" fill="#2f80ed"/>
  <text x="56" y="56" text-anchor="middle" fill="#ffffff" font-family="Noto Sans SC, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="900">M</text>
  <text x="84" y="57" class="text" font-size="19" font-weight="850">Multi-AI Code</text>
  <text x="254" y="56" class="subtle" font-size="13">远程 IM · 普通聊天 + 主从权限</text>
  <text x="770" y="56" class="muted body">设置</text>
