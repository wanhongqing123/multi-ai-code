<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f3f6fa; }
      .surface { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #dbe5f1; stroke-width: 1; }
      .soft { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .selected { fill: #e8f2ff; stroke: #2f80ed; stroke-width: 1.5; }
      .text { fill: #0f172a; font-family: "Noto Sans SC", "Microsoft YaHei UI", "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font-family: "Noto Sans SC", "Microsoft YaHei UI", "Segoe UI", sans-serif; }
      .subtle { fill: #94a3b8; font-family: "Noto Sans SC", "Microsoft YaHei UI", "Segoe UI", sans-serif; }
      .mono { fill: #334155; font-family: "Cascadia Code", Consolas, monospace; }
      .h1 { font-size: 21px; font-weight: 850; }
      .h2 { font-size: 18px; font-weight: 850; }
      .label { font-size: 13px; font-weight: 750; }
      .body { font-size: 14px; font-weight: 500; }
      .small { font-size: 12px; font-weight: 600; }
      .chipText { font-size: 12px; font-weight: 850; font-family: "Noto Sans SC", "Microsoft YaHei UI", sans-serif; }
      .buttonText { font-size: 14px; font-weight: 850; font-family: "Noto Sans SC", "Microsoft YaHei UI", sans-serif; }
