  <text x="306" y="346" text-anchor="middle" class="subtle small">01:12</text>

  <rect x="66" y="382" width="276" height="82" rx="14" class="soft"/>
  <circle cx="96" cy="412" r="17" fill="#0ea5e9"/>
  <text x="96" y="418" text-anchor="middle" fill="#ffffff" font-family="Noto Sans SC, Microsoft YaHei UI, sans-serif" font-size="13" font-weight="900">主</text>
  <text x="124" y="410" class="text" font-size="15" font-weight="850">im-a</text>
  <text x="124" y="435" class="muted small">主人消息记录</text>
