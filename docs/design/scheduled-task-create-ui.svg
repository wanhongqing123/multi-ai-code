  <rect x="706" y="586" width="222" height="40" rx="12" fill="#ECFDF3" stroke="#ABEFC6"/>
  <rect x="724" y="599" width="14" height="14" rx="4" fill="#12B76A"/>
  <path d="M727 606L732 611L739 601" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="750" y="611" class="txt">给出修改建议</text>

  <rect x="456" y="638" width="222" height="40" rx="12" fill="#ECFDF3" stroke="#ABEFC6"/>
  <rect x="474" y="651" width="14" height="14" rx="4" fill="#12B76A"/>
  <path d="M477 658L482 663L489 653" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="500" y="663" class="txt">不要直接修改代码</text>

  <rect x="706" y="638" width="222" height="40" rx="12" fill="#F9FAFB" stroke="#D0D5DD"/>
  <rect x="724" y="651" width="14" height="14" rx="4" fill="#FFFFFF" stroke="#98A2B3"/>
  <text x="750" y="663" class="txt">运行测试前先说明</text>

  <text x="456" y="720" class="label">执行方式</text>
  <rect x="456" y="738" width="222" height="42" rx="13" fill="#EFF8FF" stroke="#B2DDFF"/>
  <circle cx="478" cy="759" r="5" fill="#1677FF"/>
  <text x="494" y="764" class="txt">使用当前 AICLI</text>
  <rect x="706" y="738" width="222" height="42" rx="13" fill="#FFFAEB" stroke="#FEDF89"/>
  <circle cx="728" cy="759" r="5" fill="#F79009"/>
  <text x="744" y="764" class="txt">忙碌时排队等待</text>

  <!-- Right preview panel -->
  <rect x="984" y="160" width="302" height="650" rx="22" fill="#F8FAFC"/>
  <text x="1012" y="200" class="section">最终发送给 AICLI</text>
  <text x="1012" y="226" class="muted">保存前可确认真实 Prompt 内容</text>

  <rect x="1012" y="254" width="246" height="402" rx="18" fill="#FFFFFF" stroke="#EAECF0"/>
  <text x="1032" y="286" class="mono">你现在要执行一个定时任务。</text>
  <text x="1032" y="322" class="mono">任务名称：</text>
  <text x="1032" y="344" class="mono">每日代码巡检</text>
  <text x="1032" y="382" class="mono">工作目录：</text>
  <text x="1032" y="404" class="mono">E:\OpenSource\obs-studio</text>
  <text x="1032" y="442" class="mono">任务目标：</text>
  <text x="1032" y="464" class="mono">检查最近代码变更风险。</text>
  <text x="1032" y="502" class="mono">执行要求：</text>
  <text x="1032" y="524" class="mono">1. 分析代码风险。</text>
  <text x="1032" y="546" class="mono">2. 给出修改建议。</text>
  <text x="1032" y="568" class="mono">3. 不要直接修改代码。</text>
  <text x="1032" y="590" class="mono">4. 不要提交 git。</text>
  <text x="1032" y="628" class="mono">输出要求：中文总结。</text>

  <text x="1012" y="698" class="label">执行时间</text>
  <rect x="1012" y="714" width="116" height="52" rx="14" fill="#FFFFFF" stroke="#EAECF0"/>
  <text x="1030" y="738" class="muted">频率</text>
  <text x="1030" y="758" class="label">每天</text>
  <rect x="1142" y="714" width="116" height="52" rx="14" fill="#FFFFFF" stroke="#EAECF0"/>
  <text x="1160" y="738" class="muted">时间</text>
  <text x="1160" y="758" class="label">21:30</text>

  <!-- Footer -->
  <path d="M122 832H1318" stroke="#EAECF0"/>
  <rect x="1008" y="852" width="104" height="38" rx="12" fill="#F2F4F7"/>
  <text x="1046" y="876" class="btn2">取消</text>
  <rect x="1128" y="852" width="144" height="38" rx="12" fill="url(#accent)"/>
  <text x="1173" y="876" class="btn">保存任务</text>
