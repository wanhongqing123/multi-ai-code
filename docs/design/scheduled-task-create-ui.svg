  <circle cx="202" cy="726" r="5" fill="#F79009"/>
  <text x="216" y="731" class="muted">AICLI 忙时排队等待</text>

  <!-- Main form -->
  <rect x="424" y="160" width="536" height="650" rx="22" fill="#FFFFFF" stroke="#EAECF0"/>
  <text x="456" y="200" class="section">任务配置</text>

  <text x="456" y="240" class="label">任务名称</text>
  <rect x="456" y="254" width="472" height="44" rx="13" fill="#F9FAFB" stroke="#D0D5DD"/>
  <text x="476" y="282" class="txt">每日代码巡检</text>

  <text x="456" y="326" class="label">任务说明</text>
  <rect x="456" y="340" width="472" height="44" rx="13" fill="#F9FAFB" stroke="#D0D5DD"/>
  <text x="476" y="368" class="txt">每天检查当前项目最近代码风险，并给出建议。</text>

  <text x="456" y="410" class="label">让 AICLI 做什么</text>
  <rect x="456" y="424" width="472" height="106" rx="16" fill="#F9FAFB" stroke="#D0D5DD"/>
  <text x="476" y="454" class="txt">检查当前项目最近的代码变更，找出潜在风险、</text>
  <text x="476" y="480" class="txt">可疑实现和缺少测试的地方，并给出清晰的下一步</text>
  <text x="476" y="506" class="txt">建议。</text>

  <text x="456" y="568" class="label">具体要求</text>
  <rect x="456" y="586" width="222" height="40" rx="12" fill="#ECFDF3" stroke="#ABEFC6"/>
  <rect x="474" y="599" width="14" height="14" rx="4" fill="#12B76A"/>
  <path d="M477 606L482 611L489 601" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
