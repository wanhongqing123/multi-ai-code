  <text x="1292" y="406" class="sans label" font-size="13">AICLI 输出</text>
  <text x="1370" y="406" class="sans light" font-size="12">22:18:09</text>
  <rect x="1292" y="418" width="392" height="78" rx="16" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="1310" y="442" class="sans" fill="#0F172A" font-size="14">我会先检查 package.json 和构建脚本，</text>
  <text x="1310" y="464" class="sans" fill="#0F172A" font-size="14">然后运行构建命令定位错误。</text>
