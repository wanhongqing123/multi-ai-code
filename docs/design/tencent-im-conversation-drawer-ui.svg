<svg width="1800" height="1040" viewBox="0 0 1800 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1040" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="imHeader" x1="1224" y1="116" x2="1758" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset=".55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="flow" x1="1218" y1="236" x2="1758" y2="326" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="32" flood-color="#0F172A" flood-opacity=".16"/>
    </filter>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2563EB" flood-opacity=".18"/>
    </filter>
    <style>
      .sans { font-family: "Inter", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "Cascadia Code", Consolas, monospace; }
      .title { fill: #0F172A; font-weight: 850; }
      .label { fill: #334155; font-weight: 750; }
      .muted { fill: #64748B; }
      .light { fill: #94A3B8; }
      .card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.4; }
      .chip { fill: #F1F5F9; stroke: #E2E8F0; stroke-width: 1.2; }
      .green { fill: #22C55E; }
      .blue { fill: #0284C7; }
      .orange { fill: #F97316; }
      .red { fill: #EF4444; }
    </style>
