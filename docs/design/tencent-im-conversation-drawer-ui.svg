  <rect x="1108" y="18" width="108" height="38" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="1134" y="43" class="sans muted" font-size="15" font-weight="750">设置</text>
  <rect x="1230" y="18" width="126" height="38" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="1256" y="43" class="sans muted" font-size="15" font-weight="750">习惯监控</text>
