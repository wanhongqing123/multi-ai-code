<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#eef5fb"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .title{font:700 28px "Inter","PingFang SC","Noto Sans SC",Arial,sans-serif;fill:#0f172a}
      .h1{font:800 34px "Inter","PingFang SC","Noto Sans SC",Arial,sans-serif;fill:#0f172a}
      .h2{font:700 19px "Inter","PingFang SC","Noto Sans SC",Arial,sans-serif;fill:#172033}
      .body{font:500 16px "Inter","PingFang SC","Noto Sans SC",Arial,sans-serif;fill:#475569}
      .small{font:600 13px "Inter","PingFang SC","Noto Sans SC",Arial,sans-serif;fill:#64748b}
      .mono{font:500 15px "Cascadia Code","SF Mono",Consolas,monospace;fill:#cbd5e1}
      .monoDim{font:500 14px "Cascadia Code","SF Mono",Consolas,monospace;fill:#94a3b8}
      .chip{font:700 14px "Inter","PingFang SC","Noto Sans SC",Arial,sans-serif}
    </style>
  </defs>

  <rect width="1600" height="960" fill="url(#page)"/>
  <rect x="55" y="50" width="1490" height="860" rx="28" fill="#ffffff" filter="url(#softShadow)"/>
  <rect x="55" y="50" width="1490" height="68" rx="28" fill="#fbfdff"/>
  <line x1="55" y1="118" x2="1545" y2="118" stroke="#dbe7f3"/>

  <rect x="84" y="72" width="36" height="36" rx="10" fill="#2563eb"/>
  <text x="102" y="96" text-anchor="middle" font-family="Inter,Arial" font-size="19" font-weight="800" fill="#fff">M</text>
  <text x="138" y="96" class="title">Multi-AI Code</text>
  <rect x="343" y="73" width="84" height="34" rx="17" fill="#eef2f7"/>
  <text x="385" y="95" text-anchor="middle" class="small">v0.1.0</text>
  <text x="450" y="95" class="small">/Users/me/project/mobile-app</text>

  <rect x="1088" y="70" width="94" height="38" rx="12" fill="#eef6ff" stroke="#b6d7ff"/>
  <text x="1135" y="94" text-anchor="middle" class="chip" fill="#1d4ed8">远程 IM</text>
  <rect x="1198" y="70" width="104" height="38" rx="12" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="1250" y="94" text-anchor="middle" class="chip" fill="#334155">Skill 管理</text>
  <rect x="1318" y="70" width="88" height="38" rx="12" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="1362" y="94" text-anchor="middle" class="chip" fill="#334155">构建</text>
  <rect x="1423" y="70" width="93" height="38" rx="19" fill="#dcfce7" stroke="#86efac"/>
  <circle cx="1446" cy="89" r="6" fill="#16a34a"/>
  <text x="1482" y="94" text-anchor="middle" class="chip" fill="#15803d">运行中</text>

  <rect x="84" y="148" width="292" height="725" rx="22" fill="#f8fbff" stroke="#d9e4ef"/>
  <text x="114" y="190" class="h2">项目与任务</text>
  <rect x="114" y="214" width="232" height="44" rx="12" fill="#ffffff" stroke="#d9e4ef"/>
