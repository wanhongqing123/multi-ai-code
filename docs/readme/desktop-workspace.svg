  <rect x="114" y="285" width="232" height="88" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="138" y="318" class="h2">移动端 IM</text>
  <text x="138" y="347" class="small">ios/MultiAIIM</text>
  <rect x="274" y="309" width="51" height="25" rx="13" fill="#dcfce7"/>
  <text x="300" y="326" text-anchor="middle" class="small" fill="#15803d">活跃</text>
  <rect x="114" y="393" width="232" height="76" rx="16" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="138" y="424" class="body" fill="#1f2937">README 重写</text>
  <text x="138" y="449" class="small">文档与截图</text>
  <rect x="114" y="489" width="232" height="76" rx="16" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="138" y="520" class="body" fill="#1f2937">图片消息支持</text>
  <text x="138" y="545" class="small">Remote IM</text>
  <rect x="114" y="617" width="232" height="188" rx="18" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="138" y="652" class="h2">今日队列</text>
  <text x="138" y="687" class="body">代码审查</text>
  <text x="138" y="722" class="body">类型检查</text>
  <text x="138" y="757" class="body">构建验证</text>

  <rect x="405" y="148" width="742" height="725" rx="22" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="440" y="196" class="h1">AI CLI 工作区</text>
  <text x="440" y="230" class="body">在真实 PTY 中运行 claude / codex，并把任务上下文送入当前会话。</text>
  <rect x="440" y="266" width="672" height="390" rx="18" fill="#0f172a"/>
  <rect x="440" y="266" width="672" height="46" rx="18" fill="#111c2e"/>
  <circle cx="466" cy="289" r="7" fill="#f87171"/>
  <circle cx="490" cy="289" r="7" fill="#fbbf24"/>
  <circle cx="514" cy="289" r="7" fill="#34d399"/>
  <text x="552" y="294" class="monoDim">codex · mobile-app</text>
  <text x="468" y="350" class="mono">$ codex</text>
  <text x="468" y="386" class="monoDim">读取当前任务：支持 AICLI 图片消息回传</text>
  <text x="468" y="426" class="mono">✓ 使用 imcli send-image 回传图片</text>
  <text x="468" y="462" class="mono">✓ IPC 传递图片二进制</text>
  <text x="468" y="498" class="mono">✓ 前端构造 File 并调用 IM SDK</text>
  <text x="468" y="555" class="monoDim">npm run typecheck</text>
  <text x="468" y="591" class="mono">✓ TypeScript 检查通过</text>
  <rect x="440" y="688" width="672" height="64" rx="16" fill="#f8fafc" stroke="#d9e4ef"/>
  <text x="468" y="727" class="body">输入任务、审查意见或远程 IM 消息...</text>
  <rect x="940" y="700" width="150" height="40" rx="13" fill="#2563eb"/>
  <text x="1015" y="725" text-anchor="middle" class="chip" fill="#fff">发送到 AICLI</text>

  <rect x="1176" y="148" width="340" height="725" rx="22" fill="#f8fbff" stroke="#d9e4ef"/>
  <text x="1210" y="190" class="h2">项目状态</text>
  <rect x="1210" y="219" width="270" height="92" rx="18" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="1235" y="253" class="body">构建</text>
  <rect x="1363" y="236" width="82" height="28" rx="14" fill="#dcfce7"/>
  <text x="1404" y="255" text-anchor="middle" class="small" fill="#15803d">通过</text>
  <text x="1235" y="286" class="small">electron-vite build</text>
  <rect x="1210" y="337" width="270" height="138" rx="18" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="1235" y="373" class="h2">代码审查</text>
  <text x="1235" y="408" class="body">8 个文件已变更</text>
  <text x="1235" y="441" class="small">Remote IM / README</text>
  <rect x="1210" y="501" width="270" height="170" rx="18" fill="#ffffff" stroke="#d9e4ef"/>
  <text x="1235" y="537" class="h2">Skill 编排</text>
  <rect x="1235" y="565" width="96" height="32" rx="16" fill="#fef3c7"/>
  <text x="1283" y="586" text-anchor="middle" class="small" fill="#92400e">测试</text>
  <rect x="1343" y="565" width="96" height="32" rx="16" fill="#e0f2fe"/>
  <text x="1391" y="586" text-anchor="middle" class="small" fill="#0369a1">审查</text>
  <text x="1235" y="632" class="small">把重复工作沉淀为项目流程</text>
  <rect x="1210" y="700" width="270" height="80" rx="18" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="1235" y="735" class="body" fill="#0f766e">本地优先数据</text>
  <text x="1235" y="762" class="small">任务、记录和消息保存在本机</text>
</svg>
